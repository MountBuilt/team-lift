<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Team Lift</title>
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Team Lift">
  <!-- Warm up the Firebase connections while HTML/CSS parse; modulepreload
       breaks the app.js -> firebase.js -> gstatic discovery waterfall. -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js">
  <!-- Display face for titles and big numbers (self-hosted, OFL). -->
  <link rel="preload" href="fonts/anton-latin.woff2" as="font" type="font/woff2" crossorigin>
  <!-- Compiled Tailwind (see tailwind.config.js for the rebuild command). -->
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-ink text-neutral-100 font-sans antialiased min-h-screen">
  <div id="app" class="max-w-lg mx-auto min-h-screen"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
